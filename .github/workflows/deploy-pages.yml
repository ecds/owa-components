name: Deploy to GitHub Pages

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Build apps
        run: |
          REPO=owa-components
          ORG=ecds
          BASE_URL=https://${ORG}.github.io/${REPO}

          for app in apps/*/; do
            name=$(basename "$app")
            VITE_WP_BASE="${BASE_URL}/apps/${name}/" \
              pnpm --filter "$name" build
          done

      - name: Collect dist folders
        run: |
          mkdir -p _site/apps
          for app in apps/*/; do
            name=$(basename "$app")
            if [ -d "$app/dist" ]; then
              cp -r "$app/dist" "_site/apps/$name"
            fi
          done

      - name: Add index page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>OWA Components</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 3rem auto; padding: 0 1rem; }
              ul { line-height: 2; }
            </style>
          </head>
          <body>
            <h1>Open World Atlanta Components</h1>
            <ul id="list"></ul>
            <script>
              const apps = APPS_LIST;
              const ul = document.getElementById('list');
              apps.forEach(name => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="apps/${name}/">${name}</a>`;
                ul.appendChild(li);
              });
            </script>
          </body>
          </html>
          EOF

          # Inject the real app list
          apps=$(ls _site/apps/ | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().split()))")
          sed -i "s|APPS_LIST|${apps}|" _site/index.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  deploy-wp:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Build apps for WordPress
        run: |
          WP_PLUGIN_BASE=/wp-content/plugins/owa-components

          for app in apps/*/; do
            name=$(basename "$app")
            VITE_WP_BASE="${WP_PLUGIN_BASE}/${name}/" \
              pnpm --filter "$name" build
          done

      - name: Add SSH key
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          mkdir -p /home/runner/.ssh
          ssh-keyscan "${{ secrets.WP_HOST }}" >> /home/runner/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /home/runner/.ssh/github_actions
          chmod 600 /home/runner/.ssh/github_actions
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          ssh-add /home/runner/.ssh/github_actions

      - name: Deploy to WordPress server
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          DEST="${{ secrets.WP_SSH_USER }}@${{ secrets.WP_HOST }}:${{ secrets.WP_PLUGIN_PATH }}/owa-components"

          # Deploy the plugin file
          rsync -ae "ssh" owa-components.php "${DEST}/"

          # Deploy each app's built assets
          for app in apps/*/; do
            name=$(basename "$app")
            if [ -d "$app/dist" ]; then
              rsync -ae "ssh" --delete "$app/dist/" "${DEST}/${name}/"
            fi
          done
